services:
  backend:
    build:
      context: ./Smurf_Village_Statistical_Office
      dockerfile: Dockerfile
    container_name: smurf_backend
    restart: unless-stopped
    ports:
      - "5000:8080"
    networks:
      - private

  frontend:
    build:
      context: ./frontend
      dockerfile: Dockerfile
    container_name: smurf_frontend
    restart: unless-stopped
    ports:
      - "3000:80"
    networks:
      - private

networks:
  private:
    driver: bridge
